name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configura Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Instala dependências
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Testes
        run: bun run test

      - name: Build
        run: bun run build
