# Sobe o backend (Spring Boot) + PostgreSQL juntos.
# Uso: docker compose up --build
# API:    http://localhost:8080
# Swagger http://localhost:8080/swagger-ui.html
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dishd
      POSTGRES_USER: dishd
      POSTGRES_PASSWORD: dishd
    # porta 5432 nao publicada: evita conflito com Postgres local do host.
    # backend acessa via rede interna do compose (host "db").
    volumes:
      - dishd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishd"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dishd
      DB_USER: dishd
      DB_PASSWORD: dishd
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - backend

volumes:
  dishd_pgdata:
