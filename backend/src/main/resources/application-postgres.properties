# =========================================================================
# Perfil "postgres" — ative com: -Dspring-boot.run.profiles=postgres
# ou variavel de ambiente SPRING_PROFILES_ACTIVE=postgres (usado no Docker).
# =========================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dishd}
spring.datasource.username=${DB_USER:dishd}
spring.datasource.password=${DB_PASSWORD:dishd}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.h2.console.enabled=false
