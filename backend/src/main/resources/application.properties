spring.application.name=dishd-backend

# =========================================================================
# Banco de dados PADRAO: H2 em memoria.
# Zero configuracao -> basta "mvn spring-boot:run" e a API ja sobe com dados
# de exemplo (ver DataSeeder). Ideal para o frontend comecar a consumir.
# Para usar PostgreSQL, ative o perfil "postgres" (ver application-postgres.properties).
# =========================================================================
spring.datasource.url=jdbc:h2:mem:dishd;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Console web do H2 em http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:dishd)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =========================================================================
# JWT
# =========================================================================
dishd.jwt.secret=${DISHD_JWT_SECRET:troque-esta-chave-secreta-em-producao-dishd-0123456789-abcdefghij}
dishd.jwt.expiration-ms=86400000

# =========================================================================
# CORS — origens liberadas para o frontend (separadas por virgula, ou * para todas)
# =========================================================================
dishd.cors.allowed-origins=*

# =========================================================================
# Swagger / OpenAPI
# =========================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Health check
management.endpoints.web.exposure.include=health,info
